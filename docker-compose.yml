services:
  postgis:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gridtokenx_geo}
      POSTGRES_USER: ${POSTGRES_USER:-gridtokenx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridtokenx_pass}
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gridtokenx} -d ${POSTGRES_DB:-gridtokenx_geo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /app/mlruns
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    environment:
      - KMP_DUPLICATE_LIB_OK=TRUE
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - POSTGIS_URL=postgresql://${POSTGRES_USER:-gridtokenx}:${POSTGRES_PASSWORD:-gridtokenx_pass}@postgis:5432/${POSTGRES_DB:-gridtokenx_geo}
    depends_on:
      postgis:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_MLFLOW_URL=http://localhost:5000
    depends_on:
      - api
      - mlflow
    restart: unless-stopped

volumes:
  postgis_data:
